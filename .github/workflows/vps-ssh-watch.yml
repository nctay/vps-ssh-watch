name: VPS SSH Watch

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key

      - name: Check SSH
        env:
          VPS_LIST: ${{ secrets.VPS_LIST }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          failed=0

          while IFS='|' read -r name user host port; do
            if [ -z "$name" ] || [ "${name#\#}" != "$name" ]; then
              continue
            fi

            port="${port:-22}"
            echo "Checking ${name} (${user}@${host}:${port})"

            if ssh \
              -i ~/.ssh/vps_key \
              -p "$port" \
              -o BatchMode=yes \
              -o ConnectTimeout=8 \
              -o ConnectionAttempts=2 \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              "$user@$host" \
              "true"; then
              echo "${name}: OK"
            else
              failed=1
              text="VPS SSH DOWN: ${name} (${host}) at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
              curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d "chat_id=${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=${text}"
            fi
          done <<< "$VPS_LIST"

          exit "$failed"
